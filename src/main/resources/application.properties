spring.application.name=ItSupport

# =====================================================
# CONEXIÓN A MySQL (usando variables de Railway)
# =====================================================
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=America/Mexico_City&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =================================git====================
# JPA / HIBERNATE
# =====================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =====================================================
# CONFIGURACIÓN DEL SERVIDOR
# =====================================================
server.port=${PORT:8080}
server.servlet.context-path=/api
# =====================================================
# CONFIGURACIÓN DE LOGGING (PARA VER SQL DETALLADO)
# =====================================================
# Muestra las consultas SQL con parámetros
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# =====================================================
# CONFIGURACIÓN DE POOL DE CONEXIONES (HikariCP)
# =====================================================
# Número máximo de conexiones simultáneas
spring.datasource.hikari.maximum-pool-size=10
# Tiempo máximo de espera para una conexión (30 segundos)
spring.datasource.hikari.connection-timeout=30000
# Tiempo máximo de vida de una conexión (30 minutos)
spring.datasource.hikari.max-lifetime=1800000

# =====================================================
# CONFIGURACIÓN DE JACKSON (JSON)
# =====================================================
# Formato de fechas en JSON
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=America/Mexico_City
# No incluir nulls en el JSON
spring.jackson.default-property-inclusion=non_null
logging.level.org.springframework.security=DEBUG

# Título de la API
springdoc.info.title=API de Gestión de Tickets
springdoc.info.description=Documentación de los endpoints del sistema de soporte técnico
springdoc.info.version=1.0.0

# Opcional: para agrupar endpoints por tags automáticamente
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json

# Para exponer la documentación en /api-docs y la UI en /swagger-ui.html (por defecto)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html