spring.application.name=ItSupport

# =====================================================
# CONEXIÓN A MySQL (usando variables de Railway)
# =====================================================
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=America/Mexico_City&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =================================git====================
# JPA / HIBERNATE
# =====================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =====================================================
# CONFIGURACIÓN DEL SERVIDOR
# =====================================================
server.port=${PORT:8080}
server.servlet.context-path=/api
# =====================================================
# CONFIGURACIÓN DE LOGGING (PARA VER SQL DETALLADO)
# =====================================================
# Muestra las consultas SQL con parámetros
# 1. SILENCIA HIBERNATE (Esto es lo que más memoria consume)
# Cámbialos de INFO a ERROR para que no impriman cada SELECT
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.orm.jdbc.bind=ERROR

# 2. MANTÉN LA SEGURIDAD (Para vigilar que no vuelva el 403)
logging.level.org.springframework.security=DEBUG

# 3. OPCIONAL: Solo ver errores críticos de la App
logging.level.com.sofia.itsupport=INFO

# =====================================================
# CONFIGURACIÓN DE POOL DE CONEXIONES (HikariCP)
# =====================================================
# Número máximo de conexiones simultáneas
spring.datasource.hikari.maximum-pool-size=10
# Tiempo máximo de espera para una conexión (30 segundos)
spring.datasource.hikari.connection-timeout=30000
# Tiempo máximo de vida de una conexión (30 minutos)
spring.datasource.hikari.max-lifetime=1800000
