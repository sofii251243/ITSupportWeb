spring.application.name=ItSupport

# =====================================================
# CONEXI”N A MySQL (usando variables de Railway)
# =====================================================
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=America/Mexico_City&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =================================git====================
# JPA / HIBERNATE
# =====================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =====================================================
# CONFIGURACI”N DEL SERVIDOR
# =====================================================
server.port=${PORT:8080}
server.servlet.context-path=/api
# =====================================================
# CONFIGURACI”N DE LOGGING (PARA VER SQL DETALLADO)
# =====================================================
# Muestra las consultas SQL con par·metros
# Apagar logs detallados de Hibernate (solo errores)
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# Seguridad: solo errores y advertencias (DEBUG consume muchos recursos)
#logging.level.org.springframework.security=WARN
logging.level.org.springframework.security=DEBUG

# Logs de tu aplicaciÛn: INFO es suficiente para producciÛn
logging.level.com.sofia.itsupport=INFO

# Opcional: si quieres ver excepciones completas
logging.level.org.springframework.web=WARN
# =====================================================
# CONFIGURACI”N DE POOL DE CONEXIONES (HikariCP)
# =====================================================
# N˙mero m·ximo de conexiones simult·neas
spring.datasource.hikari.maximum-pool-size=10
# Tiempo m·ximo de espera para una conexiÛn (30 segundos)
spring.datasource.hikari.connection-timeout=30000
# Tiempo m·ximo de vida de una conexiÛn (30 minutos)
spring.datasource.hikari.max-lifetime=1800000
