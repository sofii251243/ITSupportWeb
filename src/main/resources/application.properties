spring.application.name=ItSupport

# =====================================================
# CONFIGURACIÓN DEL SERVIDOR
# =====================================================
server.port=8080
server.servlet.context-path=/api

# =====================================================
# CONEXIÓN A MySQL
# =====================================================
# Cambia 'localhost' si tu BD está en otro servidor
# Cambia '3306' si usas otro puerto
# Cambia 'root' y 'tu_contraseńa' por tus credenciales
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# =====================================================
# validate: Solo verifica que las Entities coincidan con la BD
# update: Crea/actualiza las tablas automáticamente (PELIGROSO en producción)
# create: Borra y crea las tablas cada vez (SOLO para pruebas)
# none: No hace nada
spring.jpa.hibernate.ddl-auto=validate

# Muestra las consultas SQL en consola (útil para depurar)
spring.jpa.show-sql=true

# Formatea las consultas SQL para que sean legibles
spring.jpa.properties.hibernate.format_sql=true

# Dialecto de MySQL 8 (le dice a Hibernate qué sintaxis SQL usar)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =====================================================
# CONFIGURACIÓN DE LOGGING (PARA VER SQL DETALLADO)
# =====================================================
# Muestra las consultas SQL con parámetros
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# =====================================================
# CONFIGURACIÓN DE POOL DE CONEXIONES (HikariCP)
# =====================================================
# Número máximo de conexiones simultáneas
spring.datasource.hikari.maximum-pool-size=10
# Tiempo máximo de espera para una conexión (30 segundos)
spring.datasource.hikari.connection-timeout=30000
# Tiempo máximo de vida de una conexión (30 minutos)
spring.datasource.hikari.max-lifetime=1800000

# =====================================================
# CONFIGURACIÓN DE JACKSON (JSON)
# =====================================================
# Formato de fechas en JSON
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=America/Mexico_City
# No incluir nulls en el JSON
spring.jackson.default-property-inclusion=non_null
