spring.application.name=ItSupport

# =====================================================
# CONEXI”N A MySQL (usando variables de Railway)
# =====================================================
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=America/Mexico_City&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =================================git====================
# JPA / HIBERNATE
# =====================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =====================================================
# CONFIGURACI”N DEL SERVIDOR
# =====================================================
server.port=${PORT:8080}
server.servlet.context-path=/api
# =====================================================
# CONFIGURACI”N DE LOGGING (PARA VER SQL DETALLADO)
# =====================================================
# Muestra las consultas SQL con par·metros
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# =====================================================
# CONFIGURACI”N DE POOL DE CONEXIONES (HikariCP)
# =====================================================
# N˙mero m·ximo de conexiones simult·neas
spring.datasource.hikari.maximum-pool-size=10
# Tiempo m·ximo de espera para una conexiÛn (30 segundos)
spring.datasource.hikari.connection-timeout=30000
# Tiempo m·ximo de vida de una conexiÛn (30 minutos)
spring.datasource.hikari.max-lifetime=1800000

# =====================================================
# CONFIGURACI”N DE JACKSON (JSON)
# =====================================================
# Formato de fechas en JSON
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=America/Mexico_City
# No incluir nulls en el JSON
spring.jackson.default-property-inclusion=non_null
